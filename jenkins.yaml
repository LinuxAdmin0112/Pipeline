credentials:
  system:
    domainCredentials:
      - credentials:
          - usernamePassword:
              id: "github"
              description: "GitHub Credentials"
              scope: GLOBAL
              username: "rameshlinuxadmin"
              password: "${GITHUB_PASSWORD}"

          - usernamePassword:
              id: "docker-creds"
              description: "Docker Hub Credentials"
              scope: GLOBAL
              username: "ramesh0112"
              password: "${DOCKER_PASSWORD}"

jenkins:
  systemMessage: "Jenkins managed by Configuration as Code"

  numExecutors: 2

  mode: NORMAL

  quietPeriod: 5

  scmCheckoutRetryCount: 0

  remotingSecurity:
    enabled: true

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: admin
          password: "${JENKINS_ADMIN_PASSWORD}"

  crumbIssuer: standard

unclassified:
  location:
    url: "http://localhost:8080/"
    adminAddress: "admin@abc.com"

tool:
  git:
    installations:
      - name: "Default"
        home: "/usr/bin/git"

  mavenGlobalConfig:
    globalSettingsProvider: standard
    settingsProvider: standard